<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thao tác CSS với DOM</title>
    <style>
        section {
            margin: 1rem auto;
            padding: 1rem;
            width: 500px;
            border: 1px solid green;
            border-radius: 10px;
            text-align: center;
        }
        div {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        button {
            display: block;
            padding: 1rem 2rem;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        /* Class này sẽ được thêm bằng JS */
        .active {
            background-color: yellow;
            color: green;
            font-size: 2rem;
        }
        /* Class này dùng để bật/tắt (toggle) */
        .toggle {
            background-color: red;
            color: #fff;
            border: none;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <section>
        <h1>Thao tác CSS với DOM</h1>
        <div>
            <button onclick="changeStyle()">style</button>
            <button onclick="addClass()" id="btnAddClass">classList.add()</button>
            <button onclick="removeClass()">classList.remove()</button>
            <button onclick="toggleClass()" id="btnToggle">classList.toggle()</button>
        </div>
    </section>

    <script>
        // 1. Thay đổi style trực tiếp (Inline Style)
        const changeStyle = () => {
            let sec = document.querySelector("section");
            sec.style.backgroundColor = "green";
            sec.style.color = "yellow";
        }

        // 2. Thêm một class CSS đã định nghĩa sẵn
        const addClass = () => {
            document.getElementById("btnAddClass").classList.add("active");
        }

        // 3. Xóa một class CSS
        const removeClass = () => {
            document.getElementById("btnAddClass").classList.remove("active");
        }

        // 4. Bật/Tắt class (Nếu chưa có thì thêm, nếu có rồi thì xóa)
        const toggleClass = () => {
            document.getElementById("btnToggle").classList.toggle("toggle");
        }
    </script>
</body>
</html>
